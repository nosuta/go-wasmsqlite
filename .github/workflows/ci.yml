name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Get dependencies
        run: go mod download
          
      - name: Fetch SQLite WASM assets
        run: |
          chmod +x scripts/fetch-sqlite-wasm.sh
          ./scripts/fetch-sqlite-wasm.sh
          
      - name: Build Go library
        run: GOOS=js GOARCH=wasm go build -v ./...
          
      - name: Run tests
        run: go test -v ./...
          
      - name: Build Example
        run: make build-example
          
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi
          
      - name: Run go vet
        run: GOOS=js GOARCH=wasm go vet ./...