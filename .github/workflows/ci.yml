name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Get dependencies
        run: |
          go mod download
          cd worker && npm ci
          
      - name: Build Worker
        run: |
          cd worker
          npm run build
          
      - name: Build Go library
        run: |
          GOOS=js GOARCH=wasm go build -v ./...
          
      - name: Build Example
        run: |
          cd example
          make
          
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi
          
      - name: Run go vet
        run: GOOS=js GOARCH=wasm go vet ./...
        
      - name: Check TypeScript
        run: |
          cd worker
          npx tsc --noEmit